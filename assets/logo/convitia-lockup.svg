  <defs>
    <linearGradient id="sealGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9784F"/>
      <stop offset="100%" stop-color="#8F4B34"/>
    </linearGradient>
  </defs>
  <circle cx="40" cy="40" r="38" fill="url(#sealGrad3)"/>
  <circle cx="40" cy="40" r="38" fill="none" stroke="#C9A24B" stroke-width="1.2" opacity="0.55"/>
  <text x="40.5" y="53" font-family="Georgia, 'Cormorant Garamond', serif" font-style="italic" font-size="38" fill="#FBF6EE" text-anchor="middle">C</text>
  <circle cx="68" cy="12" r="4" fill="#C9A24B"/>
